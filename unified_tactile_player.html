<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AUDIOPHILE - Hybrid Tactile Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#0d0e12",
                    "surface": "#121317",
                    "primary": "#ffd7a9",
                    "primary-container": "#ffb347",
                    "on-surface": "#e3e2e7",
                    "on-surface-variant": "#d6c3b0",
                    "outline-variant": "#524535",
                    "surface-container": "#1e1f23",
                    "surface-container-high": "#292a2e",
                    "surface-container-highest": "#343539",
            },
            "spacing": {
                    "stack-sm": "4px",
                    "stack-md": "12px",
                    "stack-lg": "24px",
                    "gutter": "16px",
                    "container-padding": "32px",
            },
            "fontFamily": {
                    "sans": ["Inter", "system-ui", "-apple-system", "sans-serif"],
                    "mono": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }
    </script>
<style>
        :root {
            --bg-color: #0d0e12;
            --accent-color: #ffd7a9;
            --glass-bg: rgba(30, 31, 35, 0.7);
            --glow-opacity: 0.12;
        }

        .theme-apple {
            --bg-color: #1a1a1a;
            --accent-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glow-opacity: 0.25;
        }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.5s ease;
        }

        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .ambient-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 179, 71, var(--glow-opacity)) 0%, rgba(13, 14, 18, 1) 75%);
            z-index: -1;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-apple .ambient-glow {
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, rgba(26, 26, 26, 1) 80%);
        }

        .tonearm {
            transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
            transform-origin: 30px 30px;
        }

        .tonearm.active {
            transform: rotate(24deg);
        }

        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl-spinning {
            animation: rotate-vinyl 3.5s linear infinite;
        }

        .glass-panel {
            backdrop-filter: blur(24px) saturate(180%);
            background: var(--glass-bg);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
        }

        .deck-container {
            perspective: 1200px;
        }
        
        .cassette-shell {
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .cassette-shell.open {
            transform: rotateX(-40deg) translateY(-20px);
        }

        .power-led {
            transition: all 0.3s ease;
        }

        .power-led.pulsing {
            animation: led-pulse 2s infinite ease-in-out;
            box-shadow: 0 0 8px rgba(255, 179, 71, 0.6);
            background-color: var(--accent-color);
        }

        @keyframes led-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .tactile-btn {
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }
        
        .tactile-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.3);
        }

        .theme-apple .tactile-btn {
            box-shadow: none;
        }

        .theme-apple .tactile-btn:active {
            transform: scale(0.95);
        }

        .swap-animation {
            animation: tape-swap 0.5s ease forwards;
        }

        @keyframes tape-swap {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(40px) scale(0.9); opacity: 0; }
            51% { transform: translateY(-40px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Apple Specific Styling */
        .theme-apple .vinyl-disc-border {
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .theme-apple #track-title {
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .theme-apple #track-artist {
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.05em;
        }
    </style>
</head>

<script>
    const body = document.getElementById('body-theme');
    const togglePro = document.getElementById('toggle-pro');
    const toggleApple = document.getElementById('toggle-apple');
    
    const tonearm = document.getElementById('tonearm');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const vinylDisc = document.getElementById('vinyl-disc');
    const progressBar = document.getElementById('progress-bar');
    const powerLed = document.getElementById('power-led');
    const cassetteBody = document.getElementById('cassette-body');
    const queueOverlay = document.getElementById('queue-overlay');
    const closeQueue = document.getElementById('close-queue');
    const vinylView = document.getElementById('vinyl-view');
    const cassetteView = document.getElementById('cassette-view');
    const navPlayer = document.getElementById('nav-player');
    const navCassette = document.getElementById('nav-cassette');
    const albumArt = document.getElementById('album-art');
    const tapeLabel = document.getElementById('tape-label');
    const trackTitle = document.getElementById('track-title');
    const trackArtist = document.getElementById('track-artist');
    const bgGlow = document.getElementById('bgGlow');

    let isPlaying = false;
    let isArmActive = false;
    let progress = 35;
    let currentMode = 'vinyl'; // 'vinyl' or 'cassette'
    let currentTheme = 'pro'; // 'pro' or 'apple'

    // Theme Toggling
    togglePro.addEventListener('click', () => setTheme('pro'));
    toggleApple.addEventListener('click', () => setTheme('apple'));

    function setTheme(theme) {
        currentTheme = theme;
        if (theme === 'apple') {
            body.classList.remove('theme-pro');
            body.classList.add('theme-apple');
            toggleApple.classList.add('bg-white', 'text-black');
            toggleApple.classList.remove('text-on-surface/40');
            togglePro.classList.remove('bg-primary', 'text-black');
            togglePro.classList.add('text-on-surface/40');
            document.getElementById('brand-name').style.opacity = "1";
        } else {
            body.classList.remove('theme-apple');
            body.classList.add('theme-pro');
            togglePro.classList.add('bg-primary', 'text-black');
            togglePro.classList.remove('text-on-surface/40');
            toggleApple.classList.remove('bg-white', 'text-black');
            toggleApple.classList.add('text-on-surface/40');
            document.getElementById('brand-name').style.opacity = "0.8";
        }
    }

    // Tonearm Logic
    tonearm.addEventListener('click', () => {
        isArmActive = !isArmActive;
        if (isArmActive) {
            tonearm.classList.add('active');
            setTimeout(() => { if(isArmActive) togglePlay(true); }, 700);
        } else {
            tonearm.classList.remove('active');
            togglePlay(false);
        }
    });

    // Playback Control
    playBtn.addEventListener('click', () => {
        if (currentMode === 'vinyl' && !isArmActive) {
            tonearm.classList.add('scale-105');
            setTimeout(() => tonearm.classList.remove('scale-105'), 200);
            return;
        }
        togglePlay(!isPlaying);
    });

    function togglePlay(state) {
        isPlaying = state;
        if (isPlaying) {
            playIcon.innerText = 'pause';
            vinylDisc.classList.add('vinyl-spinning');
            powerLed.classList.add('pulsing');
            startProgress();
        } else {
            playIcon.innerText = 'play_arrow';
            vinylDisc.classList.remove('vinyl-spinning');
            powerLed.classList.remove('pulsing');
            clearInterval(progressInterval);
        }
    }

    let progressInterval;
    function startProgress() {
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (!isPlaying) return;
            progress += 0.05;
            if (progress >= 100) progress = 0;
            progressBar.style.width = progress + '%';
        }, 1000);
    }

    // Cassette Interaction
    cassetteBody.addEventListener('click', () => {
        cassetteBody.classList.add('open');
        setTimeout(() => {
            queueOverlay.classList.remove('translate-y-full');
        }, 200);
    });

    closeQueue.addEventListener('click', () => {
        queueOverlay.classList.add('translate-y-full');
        setTimeout(() => {
            cassetteBody.classList.remove('open');
        }, 300);
    });

    // Format Navigation
    navCassette.addEventListener('click', () => {
        currentMode = 'cassette';
        vinylView.classList.add('opacity-0', 'pointer-events-none');
        cassetteView.classList.remove('opacity-0', 'pointer-events-none');
        navCassette.classList.add('text-primary');
        navPlayer.classList.remove('text-primary');
        navPlayer.classList.add('text-on-surface/40');
    });

    navPlayer.addEventListener('click', () => {
        currentMode = 'vinyl';
        cassetteView.classList.add('opacity-0', 'pointer-events-none');
        vinylView.classList.remove('opacity-0', 'pointer-events-none');
        navPlayer.classList.add('text-primary');
        navCassette.classList.remove('text-primary');
        navCassette.classList.add('text-on-surface/40');
    });

    // Track Swap
    function swapTrack(title, artist, cover) {
        const stage = document.getElementById('player-stage');
        const info = document.getElementById('info-panel');
        
        stage.classList.add('swap-animation');
        info.style.opacity = '0';
        togglePlay(false);

        setTimeout(() => {
            trackTitle.innerText = title;
            trackArtist.innerText = artist;
            albumArt.style.backgroundImage = `url(${cover})`;
            tapeLabel.innerText = title;
            progress = 0;
            progressBar.style.width = '0%';
            
            const colors = currentTheme === 'apple' ? 
                ['rgba(255, 255, 255, 0.1)', 'rgba(200, 200, 200, 0.1)'] : 
                ['rgba(255, 179, 71, 0.12)', 'rgba(71, 179, 255, 0.12)'];
            
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const baseBg = currentTheme === 'apple' ? 'rgba(26, 26, 26, 1)' : 'rgba(13, 14, 18, 1)';
            bgGlow.style.background = `radial-gradient(circle at 50% 50%, ${randomColor} 0%, ${baseBg} 75%)`;

            info.style.opacity = '1';
            stage.classList.remove('swap-animation');

            if(currentMode === 'cassette') {
                queueOverlay.classList.add('translate-y-full');
                setTimeout(() => cassetteBody.classList.remove('open'), 300);
                setTimeout(() => togglePlay(true), 600);
            }
        }, 500);
    }

    // Start UI
    startProgress();
</script>
</body></html>
